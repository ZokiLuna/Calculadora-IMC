<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { display: inline-block; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { margin: 5px; padding: 8px; width: 80%; }
        button { margin-top: 15px; padding: 10px 20px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        #resultado { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Teste de IMC</h2>
        
        <label>Altura (ex: 1.80):</label><br>
        <input type="number" id="inputAltura" step="0.01"><br><br>

        <label>Peso (ex: 79.6):</label><br>
        <input type="number" id="inputPeso" step="0.1"><br>

        <button onclick="calcularIMC()">Calcular</button>

        <div id="resultado"></div>
    </div>

    <script>
        // Esta é a mesma lógica do seu C#, mas em JavaScript
        function calcularIMC() {
            // Pegando os valores digitados no HTML
            let altura = parseFloat(document.getElementById('inputAltura').value);
            let peso = parseFloat(document.getElementById('inputPeso').value);
            let divResultado = document.getElementById('resultado');

            if (isNaN(altura) || isNaN(peso)) {
                divResultado.innerHTML = "Por favor, preencha os dois campos.";
                return;
            }

            // O cálculo
            let imc = peso / (altura * altura);
            
            // Montando a mensagem final
            let mensagem = "IMC calculado: " + imc.toFixed(2) + "<br>";

            if (imc >= 18.5 && imc <= 24.9) {
                mensagem += "Classificação: Seu IMC está excelente (Peso Normal)!<br>";
            } else {
                mensagem += "Classificação: Seu IMC está fora da faixa ideal.<br>";
            }

            if (altura <= 1.79) {
                mensagem += "Você é um frango";
            } else {
                mensagem += "Vc é o maior do mundo";
            }

            // Jogando a mensagem de volta na tela do HTML
            divResultado.innerHTML = mensagem;
        }
    </script>
</body>
</html>
